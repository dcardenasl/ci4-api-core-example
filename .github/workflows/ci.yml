name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: ${{ matrix.php-version == '8.2' && 'xdebug' || 'none' }}
          extensions: intl, mbstring, json, dom

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHPUnit
        run: composer test -- --testsuite Unit --no-coverage

  ci4-compatibility:
    name: CI4 ${{ matrix.ci4-version }} / PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']
        ci4-version: ['4.6.*', '4.7.*']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          extensions: intl, mbstring, json, dom

      - name: Install dependencies with pinned CI4 version
        run: |
          composer remove codeigniter4/framework --no-update
          composer require "codeigniter4/framework:${{ matrix.ci4-version }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: PHPUnit (Unit only — no live DB needed)
        run: composer test -- --testsuite Unit --no-coverage
